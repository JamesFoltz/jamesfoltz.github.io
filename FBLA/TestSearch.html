<!DOCTYPE html>
<html data-theme="light">
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <nav>
        <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button type="button" class="theme" data-theme-toggle>Theme</button>
        <button class="open-form-btn" onclick="toggleForm()">Open Form</button>
        </div>
        <div class="form-container" id="formContainer">
          <form id="htmlForm" onsubmit="return validateForm()">
            <input
              type="text"
              id="companyName"
              name="companyName"
              placeholder="Company Name"
              required
            /><br />
            <input type="text" id="owner" name="owner" placeholder="Industry" /><br />
            <input type="url" id="url" name="url" placeholder="Website" required/><br />
            <textarea
              id="description"
              name="description"
              rows="3"
              cols="23"
              required
              placeholder="Description"
            ></textarea><br />
            <input type="file" name="filename" accept="image/jpeg, image/png, image/webp"><br />

            <button type="submit" onclick="if(validateForm()) generateHTML()">Add Company</button>
          </form>
      </nav>

    </header>
    <input type="text" id="searchInput" placeholder="Search..." />
    <ul id="dynamicList" style="list-style: none;"></ul>


    <script src="script.js"></script>
  </body>
</html>
