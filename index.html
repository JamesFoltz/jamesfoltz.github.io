<!DOCTYPE html>
<html data-theme="light">
  <head>
    <style>
      [data-theme="light"] {
        --color-bg: #ccc;
        --color-fg: #000000;

      }

      [data-theme="dark"] {
        --color-bg: #333;
        --color-fg: #ffffff;

      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: var(--color-bg);
        color: var(--color-fg);
      }

      header {
        background-color: #666;
        padding: 1rem;
        text-align: right;
      }

      .theme {
        background-color: var(--color-fg);
        color: var(--color-bg);
        border: none;
        padding: 6px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        margin: 4px 2px;
        border-radius: 4px;
      }

      nav {
        text-align:cen;
        padding: 1rem;
      }

      nav a {
        text-decoration: none;
        padding:6px;
        color: var(--header-fg);
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button type="button" class="theme" data-theme-toggle>Theme</button>
      </nav>
    </header>
<script>
  function getTheme({ storedTheme, systemDarkSetting }) {
    if (storedTheme !== null) return storedTheme;
    return systemDarkSetting.matches ? "dark" : "light";
  }

  function updateHtmlTheme({ theme }) {
    document.querySelector("html").setAttribute("data-theme", theme);
  }

  const btn = document.querySelector("[data-theme-toggle]");
  const storedTheme = localStorage.getItem("theme");
  const systemDarkSetting = window.matchMedia("(prefers-color-scheme: dark)");

  let currentTheme = getTheme({ storedTheme, systemDarkSetting });

  updateHtmlTheme({ theme: currentTheme });

  btn.addEventListener("click", () => {
    const newTheme = currentTheme === "dark" ? "light" : "dark";

    localStorage.setItem("theme", newTheme);
    updateHtmlTheme({ theme: newTheme });

    currentTheme = newTheme;
  });
</script>

  </body>
</html>
